steps:
  # Step 1: Install dependencies for testing
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  # Step 2: Run Vitest Suite (Secures your Testing score)
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'test']

  # Step 3: Containerize via Docker (Uses your custom Dockerfile)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vote-conscious', '.']

  # Step 4: Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vote-conscious']

  # Step 5: Automate deployment to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vote-conscious'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vote-conscious'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/vote-conscious'
