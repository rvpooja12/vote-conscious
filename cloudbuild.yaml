steps:
  # Install dependencies
  - name: 'node:22'
    entrypoint: npm
    args: ['install']

  # Run Vitest Suite
  - name: 'node:22'
    entrypoint: npm
    args: ['run', 'test']

  # Build the application
  - name: 'node:22'
    entrypoint: npm
    args: ['run', 'build']

  # Containerize via Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vote-conscious', '.']

  # Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vote-conscious']

  # Automate deployment to Google Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'vote-conscious-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vote-conscious'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/vote-conscious'
